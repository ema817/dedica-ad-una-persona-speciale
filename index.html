<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dedica a mia mamma</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #fffbe7;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .dedica {
            background: #ffe4e1;
            border-radius: 12px;
            padding: 32px 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            max-width: 500px;
            text-align: center;
        }
        h1 {
            color: #d7263d;
            margin-bottom: 16px;
        }
        p {
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="dedica">
        <h1>Per la mia mamma</h1>
        <p>
            Mamma, ti amo tantissimo.<br>
            Se oggi sono una ragazza intelligente e matura, è tutto grazie a te: al tuo amore, ai tuoi insegnamenti e alla tua forza.<br>
            Sei il mio esempio più grande e la persona che mi ha dato tutto.<br>
            Grazie di cuore per essere sempre al mio fianco.
        </p>
    </div>
</body>
</html>
